name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - run: forge fmt --check
      - run: forge build
      - run: forge test -vvv
